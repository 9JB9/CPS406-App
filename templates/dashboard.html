<!doctype html>
<html lang="en">
  <head>
    <head>
      <meta charset="UTF-8" />
      <link rel="icon" type="image/svg+xml" href="/static/vite.svg" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />
      <title>Tier Editor - TierDrop</title>
      <script type="module" crossorigin src="/static/assets/index-rvRe6Uq1.js"></script>
      <link rel="stylesheet" crossorigin href="/static/assets/index-CoVxk5mt.css">
      <link rel = "stylesheet" href = "/static/css/main.css">
  </head>
  <body>
    <script>
      window.currentlist = {{current_list|tojson if current_list else 'null'}}
    </script>
    <div id="db-header">
      <ul id="nav-bar-buttons">
        <li><img src="/static/assets/td_logo.png" alt="TierDrop"></li>
        <li id="nav-home"><a href = "{{url_for('index')}}">Home</a></li>
        <li id="nav-browse"><a href = "{{url_for('search_page')}}">Browse Lists</a></li>
        <li><a href = "{{url_for('profilePage')}}">Profile</a></li>
      </ul>
    </div>
    <div id="root"></div>
    <!-- <div class="action-bar"> -->
      <!-- Placeholder button -->
      <!-- <button disabled>Subscribe</button> -->
      <!-- Active button(s) -->
      <!-- <form method="POST" style="display:inline;">
        <button type="submit" name="action" value="like" class="like-button">
          {% if liked %}
            ❤️
          {% else %}
            🤍
          {% endif %}
          <span class="likes-count">{{likes}}</span>
        </button>
      </form> -->
      <!-- Additional Placeholder buttons -->
      <!-- <button disabled>Share</button>
      <button disabled>Download</button> -->
      <!-- Views counter -->
      <!-- <span class="views-count">Views: {{views}}</span> -->
    <!-- </div> -->

    <!-- Comments Section  -->
    <div class="comments">
      <h2>Comments</h2>

      {% if current_list %}
        <form method="POST" action="{{ url_for('post_comment') }}">
          <input type="hidden" name="title" value="{{ current_list.title }}">
          <input type="hidden" name="payload" value='{{ current_list.payload|tojson }}'>
          <input type = "hidden" name = "index" value = "{{ request.args.get('index') }}">
          <textarea name="comment-input" placeholder="Add a new comment"></textarea>
          <button type="submit" name="action" value="comment">Send</button>
        </form>

        <div class="comments-preview">
          {% for comment in current_list.comments %}
            <div class="comment">
              <p class="comment-author">
                <strong>{{ comment.user }}</strong> ({{ comment.time }})
              </p>
              <p class="comment-body">{{ comment.content }}</p>
            </div>
          {% endfor %}
        </div>
      {% else %}
        <form>
          <textarea placeholder="Save this list before commenting" disabled></textarea>
          <button type="button" disabled>Send</button>
        </form>
      {% endif %}
    </div>

  </body>
</html>
