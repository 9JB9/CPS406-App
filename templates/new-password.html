{% extends 'base.html' %}

{% block head %} {% endblock %}

{% block body %} 
    <main id = "reg-main">
        <form method = 'POST' class = 'newpass-form'>
            <div class="newpass-form-div">
                <p>New Password</p>
                <input type = "password" name = "newpass" placeholder="Enter new password" required>
            </div>
            <div class="newpass-form-div">
                <p>Re-enter password</p>
                <input type = "password" name = "newpassrepeated" placeholder="Re-enter your password" required>
            </div>
            <button type ="submit">Submit</button>
        </form>
    </main>
{% endblock %}
